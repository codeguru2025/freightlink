name: freightlink-zw
region: nyc
services:
- name: web
  github:
    branch: main
    repo: codeguru2025/freightlink
  instance_count: 1
  instance_size_slug: basic-xxs
  http_port: 5000
  health_check:
    http_path: /health
  build_command: npm install && npm run build
  run_command: npm run start
  envs:
  - key: NODE_ENV
    value: production
  - key: APP_URL
    scope: RUN_TIME
    value: https://freightlink-i8hsp.ondigitalocean.app
  # DB and Auth secrets are component-specific or globally inherited
  - key: DATABASE_URL
    scope: RUN_TIME
    type: SECRET
  - key: DIRECT_DATABASE_URL
    scope: RUN_TIME
    type: SECRET
  - key: SESSION_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: GOOGLE_CLIENT_ID
    scope: RUN_TIME
    type: SECRET
  - key: GOOGLE_CLIENT_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: ADMIN_USERNAME
    scope: RUN_TIME
    type: SECRET
  - key: ADMIN_PASSWORD
    scope: RUN_TIME
    type: SECRET
  - key: PAYNOW_INTEGRATION_ID
    scope: RUN_TIME
    type: SECRET
  - key: PAYNOW_INTEGRATION_KEY
    scope: RUN_TIME
    type: SECRET
  # DigitalOcean Spaces (S3) variables are inherited from App level if set there
  - key: DO_SPACES_ENDPOINT
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_KEY
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_BUCKET
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_REGION
    scope: RUN_TIME
    type: SECRET

jobs:
- name: db-migrate
  kind: PRE_DEPLOY
  github:
    branch: main
    repo: codeguru2025/freightlink
  build_command: npm install
  run_command: npx drizzle-kit push --force
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    type: SECRET
    from_secret: DIRECT_DATABASE_URL
  - key: NODE_ENV
    value: production

databases:
- name: freightlink-db
  engine: PG
  version: "16"
  size_slug: db-s-dev-database
  num_nodes: 1
